<head>

body{

    margin:0;
    padding:20px;
    text-align:center;
}

.logo{
    width:120px;
    border-radius:50%;
    margin-top:10px;
}

}
h1{

.card{
    background:#e6d21b;
    border:3px solid #000;
    border-radius:12px;
    padding:20px;
    margin:15px auto;
    max-width:400px;
}

button{
    background:#000;
    color:white;
    border:none;
    padding:10px 20px;
    border-radius:8px;
    cursor:pointer;
}

button:hover{
    opacity:.8;
}
.toast{
  position:fixed;
  bottom:70px;
  left:50%;
  transform:translateX(-50%);
  background:#1e1e1e;
  color:white;
  padding:12px 18px;
  border-radius:12px;
  font-size:15px;
  text-align:center;
  opacity:0;
  transition:opacity .4s;
  z-index:9999;
width:80%;
  max-width:350px;

    pointer-events:none;
}

.toast.mostrar{
  opacity:1;
}    
    .descuento{
  font-size:60px;
  font-weight:bold;
  margin-bottom:25px;
    }
</style>

</head>

<body>
<div style="text-align:center;padding:20px;">
<img src="logo.png" style="width:180px;max-width:80%;">

<button onclick="mostrar('diarios')">
📅 Diarios
</button>

<button onclick="mostrar('bancarios')">
🏦 Bancarios
</button>

<button onclick="mostrar('secretos')">
🔒 Secretos
</button>

<button onclick="mostrar('aprende')">
🎓 Aprende
</button>

</div>
</div>
    <div id="diarios">
        <div id="contenedor-cupones"></div>
<h1>🔥 CUPONES DEL DÍA</h1>

    <div id="bancarios" style="display:none;">

<h1>🏦 CUPONES BANCARIOS</h1>

<div class="card">
    <h2>BBVA</h2>
    <button>
    Próximamente

<div class="card">
    <h2>Próximamente</h2>
</div>

</div>


<div id="aprende" style="display:none;">

<h1>🎓 ¿Cómo usar cupones?</h1>

<div class="card">
    <p>
    1️⃣ Copia el cupón<br><br>
    2️⃣ Abre Mercado Libre<br><br>
    3️⃣ Actívalo antes de pagar
    </p>
</div>

</div>

<script>
function copiar(cupon){
  navigator.clipboard.writeText(cupon);

  const toast = document.getElementById("mensajeCopiado");

  toast.classList.add("mostrar");

  setTimeout(() => {
    toast.classList.remove("mostrar");
  }, 2500);
}
    function mostrar(seccion){

document.getElementById("diarios").style.display="none";
document.getElementById("bancarios").style.display="none";
document.getElementById("secretos").style.display="none";
document.getElementById("aprende").style.display="none";

document.getElementById(seccion).style.display="block";

    }
    async function cargarCupones(){

  const respuesta =
  await fetch("cupones.txt");

  const texto =
  await respuesta.text();

  const contenedor =
  document.getElementById(
    "contenedor-cupones"
  );

  const bloques =
  texto.split("🎟️ Cupón:");

  contenedor.innerHTML = "";

  bloques.forEach(bloque => {

    if(
      bloque.trim() === ""
    ) return;

    const lineas =
    bloque
    .trim()
    .split("\n");

    const codigo =
    lineas[0]
    .trim();

    const descuento =
(lineas[1] || "")
.replace("$","")
.replace(" de descuento","");
    const minimo =
    lineas[2] || "";

    contenedor.innerHTML += `
      <div class="card">

        <h2 class="descuento">
🔥 -$${descuento}🔥
</h2>

        <p>${minimo}</p>

        <button onclick="copiar('${codigo}')">

        📋 Copiar y Canjear

        </button>

      </div>
    `;

  });

    }

cargarCupones();
</script>
<div id="mensajeCopiado" class="toast">
✅ ¡Cupón copiado!<br>
Ahora abre Mercado Libre y actívalo antes de pagar.
</div>
