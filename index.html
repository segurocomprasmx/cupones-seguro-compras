<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cupones Seguro Compras</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#78d0d0;
    margin:0;
    padding:20px;
    text-align:center;
}

.logo{
    width:120px;
    border-radius:50%;
    margin-top:10px;
}
img{
    pointer-events:none;
}
h1{
    color:#000;
}

.card{
    background:#e6d21b;
    border:3px solid #000;
    border-radius:12px;
    padding:20px;
    margin:15px auto;
    max-width:400px;
}

button{
    background:#000;
    color:white;
    border:none;
    padding:10px 20px;
    border-radius:8px;
    cursor:pointer;
}

button:hover{
    opacity:.8;
}
.toast{
  position:fixed;
  bottom:40px;
  left:50%;
  transform:translateX(-50%);
  background:#1e1e1e;
  color:white;
  padding:15px 35px;
  border-radius:25px;
  font-size:14px;
  text-align:center;
  opacity:0;
  transition:opacity .4s;
  z-index:9999;
  max-width:300px;

    pointer-events:none;
}

.toast.mostrar{
  opacity:1;
}    
</style>

</head>

<body>
<div style="text-align:center;padding:20px;">
<img src="logo.png" style="width:180px;max-width:80%;">

<h1 style="margin-top:10px;">Seguro Compras</h1>
<p>Cupones, ofertas y promociones actualizadas</p>
</div>
<h1>🔥 CUPONES DEL DÍA</h1>

<div class="card">
    <h2>$200 OFF desde $1500</h2>
    <button onclick="copiar('CUPON200')">📋 Copiar y Canjear</button>
</div>

<div class="card">
    <h2>$265 OFF desde $2500</h2>
    <button onclick="copiar('CUPON265')">📋 Copiar y Canjear</button>
</div>

<div class="card">
    <h2>$800 OFF desde $8000</h2>
    <button onclick="copiar('CUPON800')">📋 Copiar y Canjear</button>
</div>

<script>
function copiar(cupon){
  navigator.clipboard.writeText(cupon);

  const toast = document.getElementById("mensajeCopiado");

  toast.classList.add("mostrar");

  setTimeout(() => {
    toast.classList.remove("mostrar");
  }, 2500);
}
</script>
<div id="mensajeCopiado" class="toast">
✅ ¡Cupón copiado!<br>
Ahora abre Mercado Libre y actívalo antes de pagar.
</div>
</body>
</html>
